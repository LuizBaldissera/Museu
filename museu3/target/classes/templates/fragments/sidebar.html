<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<aside class="sidebar" th:fragment="sidebar">

  <div class="sidebar-brand">
    <h5>Museu Digital</h5>
    <small>Sistema de Gestão</small>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section">Principal</div>

    <!-- Dashboard ADMIN -->
    <a sec:authorize="hasRole('ADMIN')"
       th:href="@{/admin/dashboard}"
       th:classappend="${currentUri != null and currentUri.contains('dashboard')} ? 'active'">
      <i class="bi bi-grid-1x2"></i> Dashboard
    </a>

    <!-- Painel BIBLIOTECARIO -->
    <a sec:authorize="hasRole('BIBLIOTECARIO')"
       th:href="@{/biblio/painel}"
       th:classappend="${currentUri != null and currentUri.contains('painel')} ? 'active'">
      <i class="bi bi-grid-1x2"></i> Meu Painel
    </a>

    <div class="nav-section">Acervo</div>

    <a th:href="@{/obras}"
       th:classappend="${currentUri != null and currentUri == '/obras'} ? 'active'">
      <i class="bi bi-collection"></i> Ver Acervo
    </a>

    <a sec:authorize="hasRole('ADMIN')"
       th:href="@{/admin/obras}"
       th:classappend="${currentUri != null and currentUri.startsWith('/admin/obras')} ? 'active'">
      <i class="bi bi-list-ul"></i> Gerenciar Obras
    </a>

    <a sec:authorize="hasRole('ADMIN')"
       th:href="@{/admin/obras/nova}"
       th:classappend="${currentUri != null and currentUri.contains('nova')} ? 'active'">
      <i class="bi bi-plus-circle"></i> Nova Obra
    </a>

    <div class="nav-section" sec:authorize="hasRole('ADMIN')">Administração</div>

    <a sec:authorize="hasRole('ADMIN')"
       th:href="@{/admin/logs}"
       th:classappend="${currentUri != null and currentUri.contains('logs')} ? 'active'">
      <i class="bi bi-clock-history"></i> Logs de Auditoria
    </a>
  </nav>

  <div class="sidebar-user">
    <div class="user-row">
      <div class="user-avatar"><i class="bi bi-person" style="color:#fff;"></i></div>
      <div>
        <p class="user-name" sec:authentication="name">Usuário</p>
        <p class="user-role" sec:authorize="hasRole('ADMIN')">Administrador</p>
        <p class="user-role" sec:authorize="hasRole('BIBLIOTECARIO')">Bibliotecário</p>
      </div>
    </div>
    <form th:action="@{/logout}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="btn-logout">
        <i class="bi bi-box-arrow-right"></i> Sair
      </button>
    </form>
  </div>

</aside>
</body>
</html>
