<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Dashboard – Museu Digital</title>
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="app-layout">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <main class="main-content">

    <div class="page-header">
      <h1>Dashboard</h1>
      <p>Visão geral do acervo e atividades recentes</p>
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-icon" style="background:#3b82f6;"><i class="bi bi-collection"></i></div>
          <div><div class="stat-value" th:text="${totalObras}">0</div><div class="stat-label">Total de Obras</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:#8b5cf6;"><i class="bi bi-book"></i></div>
          <div><div class="stat-value" th:text="${totalLivros}">0</div><div class="stat-label">Livros</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:#ec4899;"><i class="bi bi-journal-richtext"></i></div>
          <div><div class="stat-value" th:text="${totalRevistas}">0</div><div class="stat-label">Revistas</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:#f59e0b;"><i class="bi bi-newspaper"></i></div>
          <div><div class="stat-value" th:text="${totalJornais}">0</div><div class="stat-label">Jornais</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:#10b981;"><i class="bi bi-people"></i></div>
          <div><div class="stat-value" th:text="${visitasHoje}">0</div><div class="stat-label">Visitas Hoje</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:#6366f1;"><i class="bi bi-graph-up"></i></div>
          <div><div class="stat-value" th:text="${totalVisitas}">0</div><div class="stat-label">Total Histórico</div></div>
        </div>
      </div>
    </div>

    <div class="content-body">
      <div style="display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem;">
        <a th:href="@{/admin/obras/nova}" class="btn-primary-custom"><i class="bi bi-plus-circle"></i> Nova Obra</a>
        <a th:href="@{/admin/obras}"      class="btn-outline-custom"><i class="bi bi-list-ul"></i> Gerenciar Acervo</a>
        <a th:href="@{/admin/logs}"       class="btn-outline-custom"><i class="bi bi-clock-history"></i> Todos os Logs</a>
      </div>

      <div class="card-white-lg">
        <div style="padding:1.25rem 1.5rem;border-bottom:1px solid #f0f0f5;display:flex;justify-content:space-between;align-items:center;">
          <h4 style="font-size:1.05rem;margin:0;">Últimas Atividades</h4>
          <a th:href="@{/admin/logs}" style="font-size:.82rem;color:var(--blue-main);">Ver todas →</a>
        </div>
        <div th:if="${#lists.isEmpty(ultimosLogs)}" style="padding:2.5rem;text-align:center;color:#a0a0b2;">
          <i class="bi bi-clock-history" style="font-size:2rem;display:block;margin-bottom:.5rem;opacity:.4;"></i>
          Nenhuma atividade registrada ainda.
        </div>
        <table th:unless="${#lists.isEmpty(ultimosLogs)}" class="admin-table">
          <thead><tr><th>Data/Hora</th><th>Ação</th><th>Obra</th><th>Usuário</th><th>Detalhes</th></tr></thead>
          <tbody>
            <tr th:each="log : ${ultimosLogs}">
              <td style="white-space:nowrap;color:#717182;font-size:.78rem;"
                  th:text="${#temporals.format(log.dataHora,'dd/MM/yyyy HH:mm')}"></td>
              <td><span th:text="${log.acao.label}"
                        th:classappend="${log.acao.name() == 'CRIAR'} ? 'badge-criar' :
                                       (${log.acao.name() == 'EDITAR'} ? 'badge-editar' : 'badge-excluir')"></span></td>
              <td style="font-weight:500;" th:text="${log.tituloObra}"></td>
              <td style="color:#717182;font-size:.82rem;"
                  th:text="${log.usuario != null ? (log.usuario.nomeCompleto ?: log.usuario.username) : 'Sistema'}"></td>
              <td style="color:#a0a0b2;font-size:.78rem;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"
                  th:text="${log.detalhes}"></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>
</body>
</html>
