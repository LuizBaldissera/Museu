<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Logs – Museu Digital</title>
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="app-layout">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <main class="main-content">
    <div class="page-header">
      <h1>Logs de Auditoria</h1>
      <p>Histórico completo de criações, edições e exclusões</p>
    </div>
    <div class="content-body">
      <div style="display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap;">
        <button class="btn-outline-custom" onclick="filtrar('todos')" style="font-size:.82rem;padding:.4rem .9rem;">Todos</button>
        <button class="btn-outline-custom" onclick="filtrar('CRIAR')"   style="font-size:.82rem;padding:.4rem .9rem;"><span class="badge-criar">Criação</span></button>
        <button class="btn-outline-custom" onclick="filtrar('EDITAR')"  style="font-size:.82rem;padding:.4rem .9rem;"><span class="badge-editar">Edição</span></button>
        <button class="btn-outline-custom" onclick="filtrar('EXCLUIR')" style="font-size:.82rem;padding:.4rem .9rem;"><span class="badge-excluir">Exclusão</span></button>
      </div>
      <div class="card-white-lg">
        <div th:if="${#lists.isEmpty(logs)}" style="padding:3rem;text-align:center;color:#a0a0b2;">
          <i class="bi bi-clock-history" style="font-size:2.5rem;display:block;margin-bottom:.75rem;opacity:.4;"></i>
          Nenhuma atividade ainda.
        </div>
        <table th:unless="${#lists.isEmpty(logs)}" class="admin-table" id="logTable">
          <thead><tr><th>Data/Hora</th><th>Ação</th><th>Obra</th><th>Usuário</th><th>Detalhes</th></tr></thead>
          <tbody>
            <tr th:each="log : ${logs}" th:attr="data-acao=${log.acao.name()}">
              <td style="white-space:nowrap;color:#717182;font-size:.78rem;" th:text="${#temporals.format(log.dataHora,'dd/MM/yyyy HH:mm')}"></td>
              <td><span th:text="${log.acao.label}"
                        th:classappend="${log.acao.name()=='CRIAR'} ? 'badge-criar' :
                                       (${log.acao.name()=='EDITAR'} ? 'badge-editar' : 'badge-excluir')"></span></td>
              <td style="font-weight:500;">
                <a th:if="${log.obraId != null}" th:href="@{/obras/{id}(id=${log.obraId})}" th:text="${log.tituloObra}" style="color:#1a1a2e;"></a>
                <span th:unless="${log.obraId != null}" th:text="${log.tituloObra}" style="color:#a0a0b2;"></span>
              </td>
              <td style="font-size:.82rem;color:#717182;" th:text="${log.usuario != null ? (log.usuario.nomeCompleto ?: log.usuario.username) : 'Sistema'}"></td>
              <td style="font-size:.78rem;color:#555;max-width:300px;">
                <span class="log-det" th:text="${log.detalhes}" style="cursor:pointer;" onclick="toggleDet(this)"></span>
              </td>
            </tr>
          </tbody>
        </table>
        <div th:unless="${#lists.isEmpty(logs)}"
             style="padding:.75rem 1rem;border-top:1px solid #f0f0f5;font-size:.8rem;color:#a0a0b2;">
          Total: <strong th:text="${#lists.size(logs)}"></strong> registro(s)
        </div>
      </div>
    </div>
  </main>
</div>
<script>
function filtrar(tipo) {
  document.querySelectorAll('#logTable tbody tr').forEach(tr => {
    tr.style.display = (tipo==='todos' || tr.dataset.acao===tipo) ? '' : 'none';
  });
}
function toggleDet(el) {
  el.style.whiteSpace = el.style.whiteSpace==='normal' ? 'nowrap' : 'normal';
  el.style.overflow   = el.style.overflow==='visible'  ? 'hidden'  : 'visible';
}
document.querySelectorAll('.log-det').forEach(el => {
  el.style.display='block'; el.style.maxWidth='300px';
  el.style.overflow='hidden'; el.style.whiteSpace='nowrap'; el.style.textOverflow='ellipsis';
  if ((el.textContent||'').length > 50) el.title='Clique para expandir';
});
</script>
</body>
</html>
