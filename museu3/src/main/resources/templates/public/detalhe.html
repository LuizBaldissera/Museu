<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title th:text="${obra.titulo} + ' – Museu Digital'">Obra</title>
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="public-nav">
  <span class="brand"><i class="bi bi-book-half"></i> Museu Digital</span>
  <div class="nav-links">
    <a th:href="@{/obras}">← Acervo</a>
    <a sec:authorize="isAuthenticated()"
       th:href="${#authorization.expression('hasRole(''ADMIN'')')} ? '/admin/dashboard' : '/biblio/painel'">
      <i class="bi bi-person-circle"></i> Meu Painel
    </a>
    <a sec:authorize="!isAuthenticated()" th:href="@{/login}" class="nav-btn">Entrar</a>
    <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" style="display:inline;">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="nav-btn" style="background:none;border:none;cursor:pointer;color:rgba(255,255,255,.7);font-size:.875rem;font-family:'Inter',sans-serif;">
        <i class="bi bi-box-arrow-right"></i> Sair
      </button>
    </form>
  </div>
</nav>

<div class="page-header">
  <a th:href="@{/obras}" class="btn-back"><i class="bi bi-arrow-left"></i> Voltar ao acervo</a>
  <h1 th:text="${obra.titulo}">Título</h1>
</div>

<div class="content-body" style="background:#f4f6fb;">
  <div th:if="${sucesso}" class="flash-success"><i class="bi bi-check-circle"></i> <span th:text="${sucesso}"></span></div>

  <div style="display:grid;grid-template-columns:1fr 2fr;gap:2rem;align-items:start;max-width:1000px;">

    <!-- Imagem -->
    <div>
      <img th:if="${obra.imageUrl != null and !#strings.isEmpty(obra.imageUrl)}"
           class="detail-img" th:src="${obra.imageUrl}" th:alt="${obra.titulo}"/>
      <div th:unless="${obra.imageUrl != null and !#strings.isEmpty(obra.imageUrl)}"
           style="width:100%;aspect-ratio:3/4;background:linear-gradient(135deg,#e8eaf6,#f3e5f5);border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#a0a0b2;gap:.75rem;">
        <i class="bi bi-book-fill" style="font-size:4rem;opacity:.4;"></i>
        <span style="font-size:.85rem;" th:text="${obra.tipoObra.label}"></span>
      </div>

      <!-- Botões admin -->
      <div sec:authorize="hasRole('ADMIN')" style="display:flex;gap:.5rem;margin-top:1rem;">
        <a th:href="@{/admin/obras/{id}/editar(id=${obra.id})}"
           class="btn-primary-custom" style="flex:1;justify-content:center;">
          <i class="bi bi-pencil"></i> Editar
        </a>
        <a th:href="@{/admin/obras/{id}/excluir(id=${obra.id})}"
           class="btn-danger-sm" style="width:auto;padding:0 1rem;border-radius:.55rem;"
           th:attr="data-titulo=${obra.titulo}"
           onclick="return confirm('Excluir &quot;' + this.dataset.titulo + '&quot;?')">
          <i class="bi bi-trash"></i>
        </a>
      </div>
    </div>

    <!-- Informações -->
    <div>
      <div class="card-white" style="padding:1.75rem;margin-bottom:1.5rem;">

        <!-- Tipo + Título + Autores -->
        <span class="obra-type-badge"
              th:classappend="${obra.tipoObra.name() == 'LIVRO'} ? 'badge-livro' :
                              (${obra.tipoObra.name() == 'REVISTA'} ? 'badge-revista' : 'badge-jornal')"
              th:text="${obra.tipoObra.label}"></span>
        <h2 th:text="${obra.titulo}" style="font-size:1.6rem;margin:.5rem 0 .2rem;"></h2>
        <p th:if="${!#strings.isEmpty(obra.autoresComoTexto)}"
           th:text="${obra.autoresComoTexto}" style="color:#717182;margin-bottom:1.25rem;font-size:.95rem;"></p>

        <!-- ── Metadados – APENAS campos com valor ─────────────────
             Regra: th:if com !#strings.isEmpty() para campos de texto
                    e simples != null para números e datas.
             Isso evita exibir linhas vazias ao usuário.
        ─────────────────────────────────────────────────────────── -->

        <div th:if="${!#strings.isEmpty(obra.categoria)}" class="meta-row">
          <i class="bi bi-tag"></i>
          <div><div class="meta-label">Categoria</div><div class="meta-value" th:text="${obra.categoria}"></div></div>
        </div>

        <div th:if="${obra.anoPublicacao != null}" class="meta-row">
          <i class="bi bi-calendar3"></i>
          <div><div class="meta-label">Ano de Publicação</div><div class="meta-value" th:text="${obra.anoPublicacao}"></div></div>
        </div>

        <div th:if="${obra.dataAquisicao != null}" class="meta-row">
          <i class="bi bi-calendar-check"></i>
          <div>
            <div class="meta-label">Data de Aquisição</div>
            <div class="meta-value" th:text="${#temporals.format(obra.dataAquisicao, 'dd/MM/yyyy')}"></div>
          </div>
        </div>

        <!-- ISBN – exibido somente quando preenchido -->
        <div th:if="${obra.isbn != null and !#strings.isEmpty(obra.isbn)}" class="meta-row">
          <i class="bi bi-upc-scan"></i>
          <div><div class="meta-label">ISBN</div><div class="meta-value" th:text="${obra.isbn}"></div></div>
        </div>

        <!-- ISSN – exibido somente quando preenchido -->
        <div th:if="${obra.issn != null and !#strings.isEmpty(obra.issn)}" class="meta-row">
          <i class="bi bi-upc-scan"></i>
          <div><div class="meta-label">ISSN</div><div class="meta-value" th:text="${obra.issn}"></div></div>
        </div>

        <div th:if="${obra.numeroPaginas != null}" class="meta-row">
          <i class="bi bi-file-earmark-text"></i>
          <div><div class="meta-label">Número de Páginas</div><div class="meta-value" th:text="${obra.numeroPaginas}"></div></div>
        </div>

        <div th:if="${obra.tecnica != null and !#strings.isEmpty(obra.tecnica)}" class="meta-row">
          <i class="bi bi-brush"></i>
          <div><div class="meta-label">Técnica / Editora</div><div class="meta-value" th:text="${obra.tecnica}"></div></div>
        </div>

        <div th:if="${obra.dimensoes != null and !#strings.isEmpty(obra.dimensoes)}" class="meta-row">
          <i class="bi bi-rulers"></i>
          <div><div class="meta-label">Dimensões</div><div class="meta-value" th:text="${obra.dimensoes}"></div></div>
        </div>

        <div th:if="${obra.localizacao != null and !#strings.isEmpty(obra.localizacao)}" class="meta-row">
          <i class="bi bi-geo-alt"></i>
          <div><div class="meta-label">Localização</div><div class="meta-value" th:text="${obra.localizacao}"></div></div>
        </div>

        <!-- Descrição -->
        <div th:if="${obra.descricao != null and !#strings.isEmpty(obra.descricao)}"
             style="margin-top:1.25rem;border-top:1px solid #f0f0f5;padding-top:1.25rem;">
          <h4 style="font-size:1rem;margin-bottom:.6rem;">Descrição</h4>
          <p th:text="${obra.descricao}" style="color:#555;line-height:1.75;font-size:.9rem;"></p>
        </div>
      </div>

      <!-- ── Notas internas (apenas usuários autenticados) ──────── -->
      <div sec:authorize="isAuthenticated()" class="card-white" style="padding:1.5rem;">
        <h4 style="font-size:1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem;">
          <i class="bi bi-sticky-fill" style="color:#f59e0b;"></i> Notas Internas
          <span style="font-size:.72rem;color:#a0a0b2;font-weight:400;">(visíveis apenas para equipe)</span>
        </h4>

        <div th:if="${notas != null and !#lists.isEmpty(notas)}">
          <div th:each="nota : ${notas}" class="nota-card">
            <div class="nota-header">
              <span class="nota-autor">
                <i class="bi bi-person-circle"></i>
                <span th:text="${nota.autor.nomeCompleto ?: nota.autor.username}"></span>
              </span>
              <div style="display:flex;align-items:center;gap:.5rem;">
                <span class="nota-data" th:text="${#temporals.format(nota.dataCriacao,'dd/MM/yyyy HH:mm')}"></span>
                <a th:href="@{/obras/{id}/nota/{nid}/excluir(id=${obra.id},nid=${nota.id})}"
                   class="btn-danger-sm" style="width:24px;height:24px;font-size:.75rem;"
                   onclick="return confirm('Remover nota?')">
                  <i class="bi bi-x"></i>
                </a>
              </div>
            </div>
            <p class="nota-text" th:text="${nota.conteudo}"></p>
          </div>
        </div>

        <p th:if="${notas == null or #lists.isEmpty(notas)}"
           style="color:#a0a0b2;font-size:.85rem;margin-bottom:.75rem;">Nenhuma nota ainda. Seja o primeiro!</p>

        <!-- Formulário para adicionar nota – COM CSRF TOKEN (fix) -->
        <form th:action="@{/obras/{id}/nota/adicionar(id=${obra.id})}" method="post"
              style="margin-top:.75rem;border-top:1px solid #fde68a;padding-top:.85rem;">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <textarea class="form-control-c" name="conteudo" rows="2"
                    placeholder="Adicionar nota interna..." required
                    style="margin-bottom:.6rem;"></textarea>
          <button type="submit" class="btn-primary-custom" style="font-size:.82rem;padding:.5rem 1rem;">
            <i class="bi bi-plus"></i> Adicionar Nota
          </button>
        </form>
      </div>

    </div><!-- /col info -->
  </div>
</div>

</body>
</html>
