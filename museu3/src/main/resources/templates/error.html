<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Erro – Museu Digital</title>
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div style="min-height:100vh;background:linear-gradient(135deg,#1e4d8b,#0d3a6f);display:flex;align-items:center;justify-content:center;padding:2rem;">
  <div style="background:#fff;border-radius:1.25rem;padding:2.5rem;max-width:460px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.2);">
    <i class="bi bi-exclamation-circle" style="font-size:3rem;color:#d4183d;display:block;margin-bottom:1rem;"></i>
    <h2 th:text="${titulo ?: 'Ocorreu um erro'}" style="margin-bottom:.75rem;font-family:'Playfair Display',serif;"></h2>
    <p th:text="${mensagem ?: 'Erro desconhecido. Tente novamente.'}"
       style="color:#717182;margin-bottom:1.5rem;font-size:.92rem;line-height:1.6;"></p>
    <div style="display:flex;gap:.75rem;justify-content:center;">
      <a th:href="@{/obras}" class="btn-primary-custom">
        <i class="bi bi-arrow-left"></i> Voltar ao acervo
      </a>
      <a href="javascript:history.back()" class="btn-outline-custom">
        <i class="bi bi-arrow-counterclockwise"></i> Página anterior
      </a>
    </div>
  </div>
</div>
</body>
</html>
