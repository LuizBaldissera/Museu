<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Login – Museu Digital</title>
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-logo"><i class="bi bi-book-half"></i></div>
  <div style="text-align:center;margin-bottom:1.75rem;">
    <h1 style="color:#fff;font-size:1.9rem;font-family:'Playfair Display',serif;margin-bottom:.25rem;">Museu Digital</h1>
    <p style="color:rgba(255,255,255,.7);margin:0;font-size:.9rem;">Sistema de Gestão de Acervo</p>
  </div>

  <div class="auth-card">
    <h2>Entrar no Sistema</h2>

    <div th:if="${sucesso}" class="flash-success" style="margin-bottom:1rem;">
      <i class="bi bi-check-circle"></i> <span th:text="${sucesso}"></span>
    </div>
    <div th:if="${erro}" class="flash-error" style="margin-bottom:1rem;">
      <i class="bi bi-exclamation-triangle"></i> <span th:text="${erro}"></span>
    </div>

    <form th:action="@{/login}" method="post">
      <div class="auth-input">
        <i class="bi bi-person"></i>
        <input type="text" name="username" placeholder="Usuário" required autofocus/>
      </div>
      <div class="auth-input">
        <i class="bi bi-lock"></i>
        <input type="password" name="password" placeholder="Senha" required/>
      </div>
      <button type="submit" class="btn-auth" style="margin-top:.5rem;">Entrar</button>
    </form>

    <div class="auth-links" style="margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid #f0f0f5;">
      Não tem conta?
      <a th:href="@{/registro}">Criar conta gratuita</a>
    </div>
    <div class="auth-links" style="margin-top:.5rem;">
      <a th:href="@{/obras}" style="color:#a0a0b2;">← Acessar o acervo público</a>
    </div>
  </div>
</div>
</body>
</html>
